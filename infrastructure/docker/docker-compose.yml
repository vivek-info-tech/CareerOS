version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: careeros-postgres
    restart: always
    environment:
      POSTGRES_DB: careeros
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: careeros-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db

  redis:
    image: redis:7
    container_name: careeros-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data


  pgadmin:
    image: dpage/pgadmin4
    container_name: careeros-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@careeros.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres



volumes:
  postgres-data:
  mongodb-data:
  redis-data:
 